<!DOCTYPE html>
<html lang="ja
">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo App</title>

    <link rel="stylesheet" href="main.css">
</head>
<body>
    <h1>ToDoリスト</h1>

    <div class="todo-wrapper">
        <div class="todoapp">
            <form id="js-form">
                <input
                    id="js-form-input"
                    class="new-todo"
                    type="text"
                    placeholder="リストに追加する内容を入力してください。"
                    autocomplete="off"
                    />
                <input type="text" style="display: none;" />
            </form>
            <div id="js-todo-list" class="todo-list">
                <!-- 動的に更新されるToDoリスト -->
            </div>
            <div class="list-count">
                <span id="js-todo-count">ToDoリスト数: 0</span>
            </div>
        </div>
        <div class="memo-area">
            <p>---Memo---</p>
            <textarea name="memo" id="memo" placeholder="メモを入力してください"></textarea>
        </div>
    </div>

<script type="module" src="index.js"></script>
    
</body>
</html>
